{% extends "main_app/main.html" %}
{% load static %}

{% block wrapper %}
<style>
    .profile_content{
        width: 100%;
        height: 100%;
        overflow: hidden;
        display: flex;
        background-color: #E7E9E7;
    }
</style>
<div class="profile_content">

    <div class="profile_body">
        <div class="profile_key-words">
            <div class="logo_profile_body">
                <img src="{{profile_logo}}" class="logo_profile_img">
            </div>
            <div class="profile_key-words_body">
                <div>{{info_user}}</div>
                <div>Lovely places</div>
                <div>Best post</div>
                <div>..</div>
            </div>
        </div>
        <div class="profile_tourist-post">
            <div class="nav_profile-post">
                <div class="switches">
                    Liked
                </div>
                <div class="tourist-post">
                    My list
                </div>
            </div>
            <div class="content_profile_post_center">
                <div class="content_profile_post">
                    {% for i in info_user_post %}
                    <div class="elem_profile_post">
                        <div class="img_elem_profile"></div>
                        <div class="writer_content_elem_profile">
                            <diV class="theme_name">
                                <div>{{i.theme_post}}</div>
                                <div>{{i.username}}</div>
                            </diV>
                            <div style="margin: auto;">{{i.type_travel}}</div>



                        </div>
                    </div>
                    {% endfor %}
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock wrapper %}
